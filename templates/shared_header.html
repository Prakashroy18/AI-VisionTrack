<!-- Shared Header Component -->
<header class="navbar">
  <div class="logo-container">
    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo" />
  </div>
  <nav class="center-nav">
    <a href="/">Home</a>
    <a href="/form">Form</a>
    <a href="/roadmap">Career Roadmap</a>
  </nav>
  <div class="header-right">
    <div class="profile-icon" onclick="window.location.href='/dashboard'">
      <i class="fas fa-user"></i>
    </div>
  </div>
</header>

<style>
/* Shared Header Styles */
header.navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px 0 50px;
  height: 70px;
  background: rgba(10, 14, 39, 0.7);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(120, 119, 198, 0.3);
  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  z-index: 15;
  box-sizing: border-box;
}

.logo-container {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  height: 45px;
  width: auto;
  display: block;
  filter: drop-shadow(0 0 10px rgba(120, 119, 198, 0.6));
  transition: transform 0.3s ease;
}

.logo:hover {
  transform: scale(1.05);
}

nav {
  display: flex;
  align-items: center;
  gap: 24px;
}

nav a {
  font-size: 1.1rem;
  font-weight: 600;
  color: #e0e7ff;
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 8px;
  transition: all 0.3s ease;
  position: relative;
  letter-spacing: 0.5px;
}

nav a::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  width: 0;
  height: 2px;
  background: linear-gradient(90deg, #a855f7, #4895ef);
  transform: translateX(-50%);
  transition: width 0.3s ease;
}

nav a:hover::before {
  width: 80%;
}

nav a:hover, nav a:focus {
  background: rgba(168, 85, 247, 0.2);
  color: #a855f7;
  text-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
}

.header-right {
  display: flex;
  align-items: center;
}

.profile-icon {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, #7f5cff, #2fd2ff);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(127, 180, 255, 0.4);
  transition: all 0.3s ease;
}

.profile-icon:hover {
  box-shadow: 0 6px 16px rgba(127, 180, 255, 0.6);
  transform: scale(1.05);
}

.profile-icon i {
  color: white;
  font-size: 18px;
}
</style>
