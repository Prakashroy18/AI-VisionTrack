<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Career Form – AI Career Counselor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="static/css/styles.css">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
    body, html {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'Rajdhani', sans-serif;
      background: #0a0e27;
      color: #fff;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 30% 20%, rgba(251, 146, 60, 0.4), transparent 50%),
        radial-gradient(circle at 70% 80%, rgba(250, 204, 21, 0.4), transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(254, 215, 170, 0.3), transparent 40%);
      animation: gradientShift 15s ease infinite;
      z-index: 0;
    }
    
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 80%, rgba(253, 224, 71, 0.2), transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(129, 140, 248, 0.2), transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(251, 191, 36, 0.15), transparent 60%);
      animation: gradientPulse 20s ease-in-out infinite;
      z-index: 0;
    }
    
    @keyframes gradientShift {
      0%, 100% { 
        opacity: 1; 
        transform: scale(1) rotate(0deg); 
      }
      25% { 
        opacity: 0.8; 
        transform: scale(1.05) rotate(90deg); 
      }
      50% { 
        opacity: 0.9; 
        transform: scale(1.02) rotate(180deg); 
      }
      75% { 
        opacity: 0.7; 
        transform: scale(1.03) rotate(270deg); 
      }
    }
    
    @keyframes gradientPulse {
      0%, 100% { 
        opacity: 0.6; 
        transform: scale(1) rotate(0deg); 
      }
      33% { 
        opacity: 0.8; 
        transform: scale(1.1) rotate(120deg); 
      }
      66% { 
        opacity: 0.4; 
        transform: scale(0.95) rotate(240deg); 
      }
    }
    
    /* Creative Particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
    }
    
    .particle {
      position: absolute;
      background: radial-gradient(circle, rgba(251, 146, 60, 0.8), transparent);
      border-radius: 50%;
      pointer-events: none;
      animation: float 20s infinite linear;
    }
    
    .particle:nth-child(odd) {
      background: radial-gradient(circle, rgba(250, 204, 21, 0.8), transparent);
    }
    
    .particle:nth-child(3n) {
      background: radial-gradient(circle, rgba(254, 215, 170, 0.8), transparent);
    }
    
    .particle:nth-child(5n) {
      background: radial-gradient(circle, rgba(253, 224, 71, 0.8), transparent);
    }
    
    @keyframes float {
      0% {
        transform: translateY(0px) translateX(0px) scale(1);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh) translateX(50px) scale(0.5);
        opacity: 0;
      }
    }
    
    /* Floating Geometric Shapes */
    .floating-shapes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    
    .shape {
      position: absolute;
      border: 2px solid rgba(251, 146, 60, 0.3);
      pointer-events: none;
      animation: rotate 60s infinite linear;
    }
    
    .shape:nth-child(1) {
      width: 100px;
      height: 100px;
      left: 5%;
      top: 10%;
      border-radius: 50%;
      animation-duration: 45s;
      border-color: rgba(251, 146, 60, 0.2);
    }
    
    .shape:nth-child(2) {
      width: 80px;
      height: 80px;
      left: 85%;
      top: 20%;
      transform: rotate(45deg);
      animation-duration: 55s;
      border-color: rgba(250, 204, 21, 0.2);
    }
    
    .shape:nth-child(3) {
      width: 120px;
      height: 120px;
      left: 60%;
      top: 70%;
      border-radius: 30%;
      animation-duration: 50s;
      border-color: rgba(254, 215, 170, 0.15);
    }
    
    .shape:nth-child(4) {
      width: 60px;
      height: 60px;
      left: 30%;
      top: 40%;
      transform: rotate(30deg);
      animation-duration: 40s;
      border-color: rgba(253, 224, 71, 0.15);
    }
    
    @keyframes rotate {
      0% {
        transform: rotate(0deg) scale(1);
        opacity: 0.3;
      }
      50% {
        transform: rotate(180deg) scale(1.1);
        opacity: 0.6;
      }
      100% {
        transform: rotate(360deg) scale(1);
        opacity: 0.3;
      }
    }
    
    /* Animated Grid Overlay */
    .grid-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(251, 146, 60, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(251, 146, 60, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
      animation: gridMove 30s linear infinite;
    }
    
    @keyframes gridMove {
      0% {
        transform: translate(0, 0);
      }
      100% {
        transform: translate(50px, 50px);
      }
    }
    header.navbar {
      padding: 0 32px;
      height: 70px;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10, 14, 39, 0.7);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(120, 119, 198, 0.3);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      z-index: 15;
    }
    .logo-container {
      display: flex;
      align-items: center;
    }
    .logo {
      height: 45px;
      width: auto;
      vertical-align: middle;
      display: block;
      filter: drop-shadow(0 0 10px rgba(120, 119, 198, 0.6));
      transition: transform 0.3s ease;
    }
    .logo:hover {
      transform: scale(1.05) rotate(5deg);
    }
    nav {
      display: flex;
      gap: 20px;
    }
    nav a {
      font-size: 1.1rem;
      margin: 0 15px;
      text-decoration: none;
      color: #e0e7ff;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 8px;
      transition: all 0.3s ease;
      position: relative;
    }
    nav a::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, #a855f7, #4895ef);
      transform: translateX(-50%);
      transition: width 0.3s ease;
    }
    nav a:hover::before {
      width: 80%;
    }
    nav a:hover {
      background: rgba(168, 85, 247, 0.2);
      color: #a855f7;
      text-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
    }
    #userName {
      margin-left: 12px;
      font-weight: 600;
      font-size: 0.95rem;
      color: #fff;
    }
    /* Enhanced Form Styling */
    .form-container {
      max-width: 900px;
      margin: 80px auto 50px auto;
      background: linear-gradient(135deg, rgba(10, 14, 39, 0.8), rgba(10, 14, 39, 0.6));
      backdrop-filter: blur(25px);
      border-radius: 30px;
      padding: 50px 45px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(120, 119, 198, 0.4);
      border: 2px solid rgba(168, 85, 247, 0.4);
      text-align: center;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    .form-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #a855f7, #4895ef, #06b6d4, #f59e0b);
      border-radius: 30px 30px 0 0;
    }

    .form-container::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #f59e0b, #06b6d4, #4895ef, #a855f7);
      border-radius: 0 0 30px 30px;
    }

    h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.8rem;
      font-weight: 900;
      margin-bottom: 40px;
      background: linear-gradient(135deg, #a855f7, #4895ef, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(168, 85, 247, 0.6));
      text-align: center;
      position: relative;
    }

    h2::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120%;
      height: 120%;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.2), transparent 70%);
      z-index: -1;
      animation: titlePulse 3s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
    }

    .form-section {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 25px;
      border: 1px solid rgba(120, 119, 198, 0.2);
      position: relative;
      overflow: hidden;
    }

    .form-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(168, 85, 247, 0.5), transparent);
      border-radius: 20px 20px 0 0;
    }

    .section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: #60a5fa;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::before {
      content: '';
      width: 8px;
      height: 8px;
      background: linear-gradient(135deg, #60a5fa, #a855f7);
      border-radius: 50%;
      display: inline-block;
    }

    .section-icon {
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, #60a5fa, #a855f7);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
      position: relative;
    }

    .form-group::before {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(120, 119, 198, 0.3), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .form-group:hover::before {
      opacity: 1;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-size: 1.05rem;
      letter-spacing: 0.3px;
      position: relative;
      padding-left: 20px;
    }

    label::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: #a855f7;
      font-size: 0.8rem;
      transition: transform 0.3s ease;
    }

    .form-group:hover label::before {
      transform: translateX(3px);
    }

    input[type="text"],
    input[type="email"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      padding: 16px 20px;
      border-radius: 15px;
      border: 2px solid rgba(120, 119, 198, 0.3);
      font-size: 1.05rem;
      margin-bottom: 2px;
      background: linear-gradient(135deg, rgba(10, 14, 39, 0.6), rgba(10, 14, 39, 0.4));
      color: #e0e7ff;
      font-weight: 500;
      box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.2);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="number"]:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: #a855f7;
      box-shadow: 0 0 25px rgba(168, 85, 247, 0.5), inset 0 2px 10px rgba(168, 85, 247, 0.1);
      background: linear-gradient(135deg, rgba(10, 14, 39, 0.8), rgba(10, 14, 39, 0.6));
      transform: translateY(-2px);
    }

    input[type="text"]::placeholder,
    input[type="email"]::placeholder,
    input[type="number"]::placeholder,
    textarea::placeholder {
      color: rgba(224, 231, 255, 0.5);
      font-style: italic;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .input-icon {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #a855f7;
      font-size: 1.1rem;
      pointer-events: none;
      opacity: 0.6;
      transition: opacity 0.3s ease;
    }

    .form-group:focus-within .input-icon {
      opacity: 1;
    }
    .cta-button {
      background: linear-gradient(135deg, #4895ef, #a855f7);
      color: #fff;
      border: 2px solid transparent;
      border-radius: 50px;
      padding: 18px 60px;
      font-size: 1.4rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 15px 40px rgba(168, 85, 247, 0.4);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      display: inline-block;
      margin-top: 35px;
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .cta-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }
    .cta-button:hover::before {
      left: 100%;
    }
    .cta-button:hover {
      border-color: #a855f7;
      box-shadow: 0 15px 40px rgba(168, 85, 247, 0.6);
      transform: translateY(-3px);
    }
    
    /* Resume Format Cards Styling */
    .format-options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 10px;
    }

    .format-card {
      border: 2px solid rgba(120, 119, 198, 0.3);
      border-radius: 12px;
      padding: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      background: rgba(10, 14, 39, 0.3);
      backdrop-filter: blur(10px);
    }

    .format-card input[type="radio"] {
      position: absolute;
      opacity: 0;
    }

    .format-card label {
      cursor: pointer;
      display: block;
      margin: 0;
      color: #cbd5e1;
    }

    .format-card label h4 {
      margin: 0 0 5px 0;
      font-size: 1.1rem;
      color: #e0e7ff;
    }

    .format-card label p {
      margin: 0;
      font-size: 0.85rem;
      color: #9ca3af;
      line-height: 1.3;
    }

    .format-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(168, 85, 247, 0.2);
      border-color: rgba(168, 85, 247, 0.5);
    }

    .format-card input[type="radio"]:checked + label {
      color: #a855f7;
    }

    .format-card input[type="radio"]:checked + label h4 {
      color: #a855f7;
      font-weight: 700;
    }

    .format-card input[type="radio"]:checked ~ .format-card {
      border-color: #a855f7;
      background: rgba(168, 85, 247, 0.1);
    }

    /* Format-specific border colors */
    .modern { border-left: 4px solid #4895ef; }
    .classic { border-left: 4px solid #28a745; }
    .creative { border-left: 4px solid #fd7e14; }
    .technical { border-left: 4px solid #6f42c1; }
    .executive { border-left: 4px solid #dc3545; }
    .minimal { border-left: 4px solid #6c757d; }

    .format-card:hover.modern { border-left-color: #4895ef; }
    .format-card:hover.classic { border-left-color: #28a745; }
    .format-card:hover.creative { border-left-color: #fd7e14; }
    .format-card:hover.technical { border-left-color: #6f42c1; }
    .format-card:hover.executive { border-left-color: #dc3545; }
    .format-card:hover.minimal { border-left-color: #6c757d; }
    
    /* Dynamic Form Styles */
    .add-btn {
      margin-top: 10px;
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #4895ef, #a855f7);
      color: white;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    
    .add-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
    }
    
    .project-item, .intern-item, .edu-item {
      margin-bottom: 15px;
      padding: 15px;
      border: 1px solid rgba(120, 119, 198, 0.2);
      border-radius: 10px;
      background: rgba(10, 14, 39, 0.3);
      position: relative;
    }
    
    .project-item button, .intern-item button, .edu-item button {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #dc3545;
      color: white;
      border: none;
      border-radius: 5px;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    
    .project-item button:hover, .intern-item button:hover, .edu-item button:hover {
      background: #c82333;
    }
    
    /* Checkbox Group Styling */
    .checkbox-group {
      text-align: left;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      cursor: pointer;
    }

    .checkbox-label input {
      width: 18px;
      height: 18px;
      accent-color: #a855f7;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Creative Theme Dynamic Background System -->
  <div class="particles" id="particles"></div>
  <div class="floating-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
  </div>
  <div class="grid-overlay"></div>
  
  <!-- Include Shared Header -->
  {% include 'shared_header.html' %}
  
  <main class="form-container">
    <h2>📝 Detailed Career & Resume Form</h2>
    <form method="POST" action="/predict">
      <!-- Personal & Academic Information -->
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required />
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" name="phone" required />
      </div>
      <div class="form-group">
        <label>Location</label>
        <input type="text" name="location" required />
      </div>
      <!-- Education (Dynamic) -->
      <div class="form-group">
        <label>Education</label>
        
        <div id="education-container">
          <div class="edu-item">
            <input type="text" name="education_level[]" placeholder="Degree (B.Tech / MSc / PhD)">
            <input type="text" name="education_college[]" placeholder="College Name">
            <input type="text" name="education_year[]" placeholder="Year (2020-2024)">
            <input type="text" name="education_percentage[]" placeholder="Percentage / CGPA">
          </div>
        </div>
        
        <button type="button" onclick="addEducation()" class="add-btn">+ Add Education</button>
      </div>
      
      <!-- Projects (Dynamic) -->
      <div class="form-group">
        <label>Projects</label>
        
        <div id="projects-container">
          <div class="project-item">
            <input type="text" name="project_title[]" placeholder="Project Title">
            <textarea name="project_details[]" placeholder="Project Description"></textarea>
            <button type="button" onclick="this.parentElement.remove()" style="position: absolute; top: 10px; right: 10px; background: #dc3545; color: white; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer; font-size: 0.8rem;">Remove</button>
          </div>
        </div>
        
        <button type="button" onclick="addProject()" class="add-btn">+ Add Project</button>
      </div>
      
      <!-- Internships (Dynamic) -->
      <div class="form-group">
        <label>Internships</label>
        
        <div id="internship-container">
          <div class="intern-item">
            <input type="text" name="intern_company[]" placeholder="Company Name">
            <input type="text" name="intern_role[]" placeholder="Role / Duration">
            <button type="button" onclick="this.parentElement.remove()" style="position: absolute; top: 10px; right: 10px; background: #dc3545; color: white; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer; font-size: 0.8rem;">Remove</button>
          </div>
        </div>
        
        <button type="button" onclick="addInternship()" class="add-btn">+ Add Internship</button>
      </div>
      
      <!-- Career Objective -->
      <div class="form-group">
        <label>Career Objective</label>
        <textarea name="career_objective" rows="3" placeholder="Your career goals and aspirations..."></textarea>
      </div>
      <!-- Skills and Extras -->
      <div class="form-group">
        <label>Technical Skills (comma separated)</label>
        <input type="text" name="skills" placeholder="Python, SQL, Data Analysis" />
      </div>
      <div class="form-group">
        <label>Non-Technical Skills (comma separated)</label>
        <input type="text" name="non_technical" placeholder="Communication, Leadership" />
      </div>
      <div class="form-group">
        <label>Interests (comma separated)</label>

  <script>
    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDcWsY1mzvghwApo76syt1XWc9jjLTEtnM",
      authDomain: "ai-career-counselor-e64b8.firebaseapp.com",
      projectId: "ai-career-counselor-e64b8",
      storageBucket: "ai-career-counselor-e64b8.appspot.com",
      messagingSenderId: "339133928751",
      appId: "1:339133928751:web:7ad0d40eadcaebb7b23dda"
    };

    // Initialize Firebase
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    // Check authentication and setup form
    auth.onAuthStateChanged(function(user) {
      if (!user) {
        // Redirect to login if not authenticated
        window.location.replace("/login");
        return;
      }
      
      // User is authenticated, setup form submission
      console.log("User logged in:", user.email);
      
      document.querySelector("form").addEventListener("submit", function(e) {
        e.preventDefault();
        
        const form = this;
        
        console.log("Form submission intercepted");
        
        // Collect form data
        const formData = {
          fullName: document.querySelector('input[name="name"]').value,
          email: user.email,
          skills: document.querySelector('input[name="skills"]').value,
          interests: document.querySelector('input[name="interests"]').value,
          workType: document.querySelector('select[name="work_type"]').value,
          experience: document.querySelector('input[name="experience"]').value,
          education: document.querySelector('input[name="education_level[]"]').value,
          generateResume: document.querySelector('input[name="generate_resume"]').checked,
          resumeFormat: document.querySelector('input[name="resume_format"]:checked')?.value || 'modern',
          submittedAt: new Date().toISOString()
        };
        
        console.log("Saving form data:", formData);
        
        // Save to Firestore first
        db.collection("users").doc(user.uid).set(formData, { merge: true })
          .then(() => {
            console.log("Form data saved successfully!");
            alert("Career profile saved successfully!");
            
            console.log("About to submit form to Flask...");
            
            // ✅ NOW SUBMIT FORM TO FLASK
            form.submit();
          })
          .catch((error) => {
            console.error("Error saving form data:", error);
            alert("Failed to save profile. Please try again.");
          });
      });
    });
    
    function toggleResumeFormat() {
      const checkbox = document.querySelector('input[name="generate_resume"]');
      const formatGroup = document.getElementById('resumeFormatGroup');
      
      if (checkbox.checked) {
        formatGroup.style.display = 'block';
      } else {
        formatGroup.style.display = 'none';
      }
    }
    
    function toggleAIResume() {
      const aiCheckbox = document.querySelector('input[name="ai_resume"]');
      const resumeCheckbox = document.querySelector('input[name="generate_resume"]');
      
      // Auto-enable resume generation if AI resume is selected
      if (aiCheckbox.checked && !resumeCheckbox.checked) {
        resumeCheckbox.checked = true;
        toggleResumeFormat(); // Show format options
      }
    }
    
    // Form validation
    document.querySelector("form").addEventListener("submit", function(e){
      const generateResume = document.querySelector('input[name="generate_resume"]').checked;
      const formatSelected = document.querySelector('input[name="resume_format"]:checked');
      
      if(generateResume && !formatSelected){
        alert("Please select a resume format");
        e.preventDefault();
        return false;
      }
    });
    
    function addEducation() {
      const container = document.getElementById("education-container");
      
      const html = `
      <div class="edu-item">
          <select name="education_level[]" style="margin-bottom: 8px; width: 100%; padding: 8px; border-radius: 8px; border: 2px solid rgba(120, 119, 198, 0.3); background: linear-gradient(135deg, rgba(10, 14, 39, 0.6), rgba(10, 14, 39, 0.4)); color: #e0e7ff;">
            <option value="">Select Education Level</option>
            <option value="SSC">SSC</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Diploma">Diploma</option>
            <option value="B.Tech">B.Tech</option>
            <option value="B.Sc">B.Sc</option>
            <option value="M.Tech">M.Tech</option>
            <option value="M.Sc">M.Sc</option>
            <option value="PhD">PhD</option>
          </select>
          <input type="text" name="education_college[]" placeholder="Institution Name" style="margin-bottom: 8px;">
          <input type="text" name="education_year[]" placeholder="Year (2018-2020)" style="margin-bottom: 8px;">
          <input type="text" name="education_percentage[]" placeholder="CGPA / Percentage" style="margin-bottom: 8px;">
          <button type="button" onclick="this.parentElement.remove()" style="position: absolute; top: 10px; right: 10px; background: #dc3545; color: white; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer; font-size: 0.8rem;">Remove</button>
      </div>
      `;
      
      container.insertAdjacentHTML("beforeend", html);
    }
    
    function addProject() {
      const container = document.getElementById("projects-container");
      
      const html = `
      <div class="project-item">
        <input type="text" name="project_title[]" placeholder="Project Title">
        <textarea name="project_details[]" placeholder="Project Description"></textarea>
        <button type="button" onclick="this.parentElement.remove()" style="position: absolute; top: 10px; right: 10px; background: #dc3545; color: white; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer; font-size: 0.8rem;">Remove</button>
      </div>
      `;
      
      container.insertAdjacentHTML("beforeend", html);
    }
    
    function addInternship() {
      const container = document.getElementById("internship-container");
      
      const html = `
      <div class="intern-item">
        <input type="text" name="intern_company[]" placeholder="Company Name">
        <input type="text" name="intern_role[]" placeholder="Role / Duration">
        <button type="button" onclick="this.parentElement.remove()" style="position: absolute; top: 10px; right: 10px; background: #dc3545; color: white; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer; font-size: 0.8rem;">Remove</button>
      </div>
      `;
      
      container.insertAdjacentHTML("beforeend", html);
    }
  </script>
